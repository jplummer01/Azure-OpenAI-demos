<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CartPole Policy-Gradient Sandbox</title>
<style>
  :root{
    --bg:#f4f6f8;
    --card:#ffffff;
    --accent:#3b82f6;
    --muted:#64748b;
    --text:#0f172a;
  }
  *{box-sizing:border-box;font-family: "Segoe UI", Roboto, Arial, sans-serif;}
  body{margin:0;background:var(--bg);color:var(--text);}
  header{
    padding:18px 28px;
    font-size:22px;
    font-weight:600;
    background:#fff;
    border-bottom:1px solid #e2e8f0;
  }
  #app{display:flex;flex-direction:column;height:100vh;}
  .content{display:flex;flex:1;gap:16px;padding:16px;}
  .left{flex:2;display:flex;flex-direction:column;gap:12px;}
  .right{flex:1;display:flex;flex-direction:column;gap:12px;}
  canvas{
    background:#fdfdfd;
    border:1px solid #e2e8f0;
    border-radius:10px;
  }
  .card{
    background:var(--card);
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:14px;
    box-shadow:0 4px 10px rgba(15,23,42,0.04);
  }
  .controls{display:flex;gap:10px;align-items:center;}
  button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:8px 14px;
    cursor:pointer;
    font-weight:600;
  }
  button.secondary{
    background:#94a3b8;
  }
  .metrics .metric{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    color:var(--muted);
  }
  .metrics .metric span:last-child{color:var(--text);font-weight:600;}
  .legend{
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
  }
  .status{
    font-size:12px;color:var(--muted);
  }
</style>
</head>
<body>
<div id="app">
  <header>CartPole Policy‑Gradient Sandbox</header>
  <div class="content">
    <div class="left">
      <canvas id="cartCanvas" width="640" height="400"></canvas>
      <div class="controls card">
        <button id="toggleBtn">Start</button>
        <button id="resetBtn" class="secondary">Reset</button>
        <label class="status">
          <input type="checkbox" id="trainChk" checked /> Training Mode
        </label>
        <span class="status" id="modeInfo">Idle</span>
      </div>
    </div>
    <div class="right">
      <div class="card metrics">
        <h3>Metrics</h3>
        <div class="metric"><span>Episode Steps</span><span id="steps">0</span></div>
        <div class="metric"><span>Episode Reward</span><span id="reward">0</span></div>
        <div class="metric"><span>Last Survival</span><span id="lastSurv">0</span></div>
        <div class="metric"><span>Best Survival</span><span id="bestSurv">0</span></div>
        <div class="metric"><span>Action P(right)</span><span id="actionP">0.50</span></div>
      </div>
      <div class="card">
        <h3>Network Visualizer</h3>
        <svg id="netViz" width="320" height="220"></svg>
        <div class="legend">
          Node color = activation (blue positive, orange negative).<br/>
          Edge thickness = |weight|, color shows sign.
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ==== CartPole Environment ==== */
const gravity = 9.8;
const masscart = 1.0;
const masspole = 0.1;
const total_mass = masspole + masscart;
const length = 0.5; // half the pole length
const polemass_length = masspole * length;
const force_mag = 10.0;
const tau = 0.02; // seconds between state updates
const x_threshold = 2.4;
const theta_threshold = 12 * Math.PI / 180;

let envState = resetEnv();

function resetEnv(){
  return [
    (Math.random()-0.5)*0.1,
    (Math.random()-0.5)*0.1,
    (Math.random()-0.5)*0.1,
    (Math.random()-0.5)*0.1
  ];
}

function stepEnv(action){
  let [x, xDot, theta, thetaDot] = envState;
  const force = action === 1 ? force_mag : -force_mag;
  const costheta = Math.cos(theta);
  const sintheta = Math.sin(theta);

  const temp = (force + polemass_length * thetaDot * thetaDot * sintheta) / total_mass;
  const thetaAcc = (gravity * sintheta - costheta * temp) /
                  (length * (4.0/3.0 - masspole * costheta * costheta / total_mass));
  const xAcc = temp - polemass_length * thetaAcc * costheta / total_mass;

  x += tau * xDot;
  xDot += tau * xAcc;
  theta += tau * thetaDot;
  thetaDot += tau * thetaAcc;

  envState = [x, xDot, theta, thetaDot];

  const done = x < -x_threshold || x > x_threshold ||
               theta < -theta_threshold || theta > theta_threshold;

  const reward = done ? 0 : 1;
  return {state: envState, reward, done};
}

/* ==== Policy Network ==== */
const inputSize = 4;
const hiddenSize = 8;
let W1 = [...Array(hiddenSize)].map(()=> [...Array(inputSize)].map(()=> randn()*0.1));
let b1 = [...Array(hiddenSize)].map(()=>0);
let W2 = [...Array(hiddenSize)].map(()=> randn()*0.1);
let b2 = 0;

function randn(){
  // Box-Muller
  let u=0,v=0;
  while(u===0) u=Math.random();
  while(v===0) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

function normalizeState(s){
  return [
    s[0]/x_threshold,
    s[1]/3.0,
    s[2]/theta_threshold,
    s[3]/3.0
  ];
}

function forward(s){
  const h = new Array(hiddenSize);
  for(let i=0;i<hiddenSize;i++){
    let sum = b1[i];
    for(let j=0;j<inputSize;j++) sum += W1[i][j]*s[j];
    h[i] = Math.tanh(sum);
  }
  let logit = b2;
  for(let i=0;i<hiddenSize;i++) logit += W2[i]*h[i];
  const p = 1/(1+Math.exp(-logit));
  return {h,p};
}

/* ==== Training buffers ==== */
let episodeStates=[], episodeActions=[], episodeHs=[], episodePs=[], episodeRewards=[];
let steps=0, episodeReward=0, lastSurvival=0, bestSurvival=0;
const gamma=0.99, lr=0.01;

function trainEpisode(){
  // compute returns
  let G=0;
  const returns = episodeRewards.map(r=>{
    G = r + gamma*G;
    return G;
  }).reverse(); // reverse due to backward accumulation
  returns.reverse();

  const mean = returns.reduce((a,b)=>a+b,0)/returns.length;

  // gradients
  let dW2 = new Array(hiddenSize).fill(0);
  let db2 = 0;
  let dW1 = [...Array(hiddenSize)].map(()=> new Array(inputSize).fill(0));
  let db1 = new Array(hiddenSize).fill(0);

  for(let t=0;t<episodeStates.length;t++){
    const s = episodeStates[t];
    const h = episodeHs[t];
    const p = episodePs[t];
    const a = episodeActions[t];
    const advantage = returns[t] - mean;
    const delta = (a - p) * advantage;

    for(let i=0;i<hiddenSize;i++){
      dW2[i] += delta * h[i];
    }
    db2 += delta;

    for(let i=0;i<hiddenSize;i++){
      const dh = (1 - h[i]*h[i]) * W2[i] * delta;
      db1[i] += dh;
      for(let j=0;j<inputSize;j++){
        dW1[i][j] += dh * s[j];
      }
    }
  }

  // update weights
  for(let i=0;i<hiddenSize;i++){
    W2[i] += lr*dW2[i];
    b1[i] += lr*db1[i];
    for(let j=0;j<inputSize;j++){
      W1[i][j] += lr*dW1[i][j];
    }
  }
  b2 += lr*db2;
}

/* ==== Visualization ==== */
const canvas = document.getElementById("cartCanvas");
const ctx = canvas.getContext("2d");

function drawCartPole(state){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#fdfdfd";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // track
  ctx.strokeStyle="#cbd5e1";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(40,300);
  ctx.lineTo(canvas.width-40,300);
  ctx.stroke();

  const scale = 100;
  const cartX = canvas.width/2 + state[0]*scale;
  const cartY = 280;
  const cartW = 60;
  const cartH = 30;

  // cart
  ctx.fillStyle="#64748b";
  ctx.fillRect(cartX - cartW/2, cartY - cartH/2, cartW, cartH);

  // pole
  const poleLen = 120;
  const theta = state[2];
  const poleX = cartX + poleLen * Math.sin(theta);
  const poleY = cartY - poleLen * Math.cos(theta);

  ctx.strokeStyle="#3b82f6";
  ctx.lineWidth=6;
  ctx.beginPath();
  ctx.moveTo(cartX, cartY);
  ctx.lineTo(poleX, poleY);
  ctx.stroke();

  // pivot
  ctx.fillStyle="#1e293b";
  ctx.beginPath();
  ctx.arc(cartX, cartY, 5, 0, Math.PI*2);
  ctx.fill();
}

/* ==== SVG Network Visualizer ==== */
const svg = document.getElementById("netViz");
const edges1=[], edges2=[], inputNodes=[], hiddenNodes=[];
let outputNode=null;

function createNetworkViz(){
  const width=320, height=220;
  const inX=40, hidX=160, outX=280;
  const inGap = height/(inputSize+1);
  const hidGap = height/(hiddenSize+1);

  // edges input->hidden
  for(let i=0;i<hiddenSize;i++){
    for(let j=0;j<inputSize;j++){
      const line = document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1",inX);
      line.setAttribute("y1",(j+1)*inGap);
      line.setAttribute("x2",hidX);
      line.setAttribute("y2",(i+1)*hidGap);
      line.setAttribute("stroke","#94a3b8");
      line.setAttribute("stroke-width","1");
      svg.appendChild(line);
      edges1.push(line);
    }
  }

  // edges hidden->output
  for(let i=0;i<hiddenSize;i++){
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",hidX);
    line.setAttribute("y1",(i+1)*hidGap);
    line.setAttribute("x2",outX);
    line.setAttribute("y2",height/2);
    line.setAttribute("stroke","#94a3b8");
    line.setAttribute("stroke-width","1");
    svg.appendChild(line);
    edges2.push(line);
  }

  // input nodes
  for(let j=0;j<inputSize;j++){
    const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",inX);
    c.setAttribute("cy",(j+1)*inGap);
    c.setAttribute("r",8);
    c.setAttribute("fill","#e2e8f0");
    svg.appendChild(c);
    inputNodes.push(c);
  }

  // hidden nodes
  for(let i=0;i<hiddenSize;i++){
    const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",hidX);
    c.setAttribute("cy",(i+1)*hidGap);
    c.setAttribute("r",8);
    c.setAttribute("fill","#e2e8f0");
    svg.appendChild(c);
    hiddenNodes.push(c);
  }

  // output node
  outputNode = document.createElementNS("http://www.w3.org/2000/svg","circle");
  outputNode.setAttribute("cx",outX);
  outputNode.setAttribute("cy",height/2);
  outputNode.setAttribute("r",10);
  outputNode.setAttribute("fill","#e2e8f0");
  svg.appendChild(outputNode);
}
createNetworkViz();

function weightColor(w){
  const v=Math.max(-1,Math.min(1,w));
  const a=Math.abs(v);
  return v>=0 ? `rgba(59,130,246,${0.2+0.8*a})` : `rgba(234,88,12,${0.2+0.8*a})`;
}
function activationColor(v){
  const a=Math.abs(v);
  return v>=0 ? `rgba(59,130,246,${0.2+0.8*a})` : `rgba(234,88,12,${0.2+0.8*a})`;
}
function outputColor(p){
  return `rgba(16,185,129,${0.2+0.8*p})`;
}

function updateViz(state,h,p){
  // edges input-hidden
  let idx=0;
  for(let i=0;i<hiddenSize;i++){
    for(let j=0;j<inputSize;j++){
      const w=W1[i][j];
      edges1[idx].setAttribute("stroke",weightColor(w));
      edges1[idx].setAttribute("stroke-width",0.5+Math.abs(w)*3);
      idx++;
    }
  }
  // edges hidden-output
  for(let i=0;i<hiddenSize;i++){
    const w=W2[i];
    edges2[i].setAttribute("stroke",weightColor(w));
    edges2[i].setAttribute("stroke-width",0.5+Math.abs(w)*3);
  }

  // input nodes
  for(let j=0;j<inputSize;j++){
    inputNodes[j].setAttribute("fill",activationColor(state[j]));
  }
  // hidden nodes
  for(let i=0;i<hiddenSize;i++){
    hiddenNodes[i].setAttribute("fill",activationColor(h[i]));
  }
  // output node
  outputNode.setAttribute("fill",outputColor(p));
}

/* ==== Simulation Loop ==== */
let running=false;
const toggleBtn = document.getElementById("toggleBtn");
const resetBtn = document.getElementById("resetBtn");
const trainChk = document.getElementById("trainChk");
const modeInfo = document.getElementById("modeInfo");

toggleBtn.onclick=()=>{
  running=!running;
  toggleBtn.textContent = running ? "Pause" : "Start";
  modeInfo.textContent = running ? (trainChk.checked?"Training":"Inference") : "Idle";
};
resetBtn.onclick=()=>{
  envState = resetEnv();
  steps=0; episodeReward=0;
  episodeStates=[];episodeActions=[];episodeHs=[];episodePs=[];episodeRewards=[];
};

function updateMetrics(p){
  document.getElementById("steps").textContent = steps;
  document.getElementById("reward").textContent = episodeReward.toFixed(1);
  document.getElementById("lastSurv").textContent = lastSurvival;
  document.getElementById("bestSurv").textContent = bestSurvival;
  document.getElementById("actionP").textContent = p.toFixed(2);
}

function simStep(){
  const sNorm = normalizeState(envState);
  const {h,p} = forward(sNorm);
  const action = Math.random() < p ? 1 : 0;

  const {state, reward, done} = stepEnv(action);

  // record if training
  if(trainChk.checked){
    episodeStates.push(sNorm);
    episodeActions.push(action);
    episodeHs.push(h);
    episodePs.push(p);
    episodeRewards.push(reward);
  }

  steps += 1;
  episodeReward += reward;

  updateViz(sNorm,h,p);
  updateMetrics(p);
  drawCartPole(state);

  if(done){
    lastSurvival = steps;
    if(lastSurvival > bestSurvival) bestSurvival = lastSurvival;
    if(trainChk.checked && episodeStates.length>1) trainEpisode();

    // reset episode
    envState = resetEnv();
    steps=0; episodeReward=0;
    episodeStates=[];episodeActions=[];episodeHs=[];episodePs=[];episodeRewards=[];
  }
}

function loop(){
  if(running){
    // multiple steps per frame for faster training
    for(let i=0;i<2;i++) simStep();
  }
  requestAnimationFrame(loop);
}

drawCartPole(envState);
loop();
</script>
</body>
</html>
